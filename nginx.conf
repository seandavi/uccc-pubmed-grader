server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # SPA fallback (single-page React app)
  location / {
    try_files $uri /index.html;
  }

  # Hashed asset files never change — cache aggressively.
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html should not be cached so deploys are picked up immediately.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/javascript application/xml+rss application/xml image/svg+xml;
}
