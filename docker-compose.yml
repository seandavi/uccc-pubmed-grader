# Single static-SPA service. Traefik (in monode/infrastructure/compose/traefik)
# attaches via the external `web` network in production.

services:
  app:
    build:
      context: .
      args:
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
    container_name: uccc-pubmed-grader
    restart: unless-stopped
    ports:
      - "8080:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pubmed-grader.rule=Host(`pubmed-grader.example.org`)"
      - "traefik.http.routers.pubmed-grader.entrypoints=websecure"
      - "traefik.http.routers.pubmed-grader.tls.certresolver=letsencrypt"
      - "traefik.http.services.pubmed-grader.loadbalancer.server.port=80"
    networks:
      - default
      # - web  # uncomment when attaching to shared Traefik network

networks:
  default:
  # web:
  #   external: true
